<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light" />
    <meta http-equiv="Cache-Control" content="no-cache" />
    <title>Not a Number — Two ways of living in one body</title>
    <meta
      name="description"
      content="An interactive narrative about the body, food, and the mind. Two modes, one body."
    />
    <meta property="og:title" content="Not a Number" />
    <meta
      property="og:description"
      content="Two ways of living in one body — an interactive narrative."
    />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css?v=3" />
  </head>

  <body data-stage="landing" data-mode="numbers">
    <div class="ambient" aria-hidden="true">
      <span class="ambient__grain"></span>
      <span class="ambient__veil ambient__veil--a"></span>
      <span class="ambient__veil ambient__veil--b"></span>
    </div>

    <section
      id="landing"
      class="landing"
      aria-label="Intro"
    >
      <div class="landing__inner">
        <p class="landing__eyebrow">an interactive essay</p>
        <h1 class="landing__title">
          <span>You are</span>
          <span class="landing__title--strike">not</span>
          <span>a <em>number</em>.</span>
        </h1>
        <p class="landing__subtitle">Two ways of living in one body.</p>

        <button
          id="enterBtn"
          class="enter"
          type="button"
          aria-label="Enter the experience"
        >
          <span class="enter__label">Enter</span>
          <span class="enter__arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path
                d="M4 12h15M13 6l6 6-6 6"
                fill="none"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
        </button>

        <p class="landing__hint">
          headphones optional · best on desktop
        </p>
      </div>
    </section>

    <main id="scene" class="scene" aria-hidden="true">
      <header class="topbar">
        <div class="topbar__brand" aria-hidden="true">
          <span class="topbar__mark">◯</span>
          <span class="topbar__name">Not a Number</span>
        </div>

        <div
          class="toggle"
          role="tablist"
          aria-label="Choose a way of living"
        >
          <button
            class="toggle__btn is-active"
            role="tab"
            aria-selected="true"
            data-mode="numbers"
            type="button"
          >
            <span class="toggle__dot" aria-hidden="true"></span>
            Numbers
          </button>
          <button
            class="toggle__btn"
            role="tab"
            aria-selected="false"
            data-mode="peace"
            type="button"
          >
            <span class="toggle__dot" aria-hidden="true"></span>
            Peace
          </button>
          <span class="toggle__thumb" aria-hidden="true"></span>
        </div>

        <button
          id="resetBtn"
          class="topbar__reset"
          type="button"
          aria-label="Reset the experience"
          title="Reset"
        >
          reset
        </button>
      </header>

      <section class="stage" aria-label="Interactive scene">
        <div
          id="noiseLayer"
          class="noise"
          aria-hidden="true"
        ></div>

        <div
          id="bubbles"
          class="bubbles"
          aria-label="Tap the bubbles"
        ></div>

        <figure class="figure" aria-label="A person in the middle of the scene">
          <div class="figure__glow" aria-hidden="true"></div>
          <div id="figure" class="figure__body" data-stage-index="0">
          </div>
          <figcaption class="figure__caption" id="figureCaption">
            <span class="figure__thought" id="figureThought"></span>
          </figcaption>
        </figure>

        <div
          id="ending"
          class="ending"
          role="dialog"
          aria-live="polite"
          aria-hidden="true"
        >
          <div class="ending__inner">
            <p class="ending__line" data-line="1"></p>
            <p class="ending__line" data-line="2"></p>
            <p class="ending__line" data-line="3"></p>
            <p class="ending__line" data-line="4"></p>
            <button
              id="endingClose"
              class="ending__close"
              type="button"
              aria-label="Close"
            >
              close
            </button>
          </div>
        </div>
      </section>

      <footer class="bottombar">
        <div class="meter" aria-live="polite">
          <span class="meter__label" id="meterLabel">Numbers</span>
          <span class="meter__count">
            <span id="meterValue">0</span>
            <span class="meter__slash">/</span>
            <span id="meterMax">10</span>
          </span>
        </div>
        <p class="bottombar__hint" id="bottomHint">
          tap the bubbles
        </p>
      </footer>
    </main>

    <div class="cursor-dot" id="cursorDot" aria-hidden="true"></div>

    <script src="./script.js?v=3" defer></script>
  </body>
</html>
